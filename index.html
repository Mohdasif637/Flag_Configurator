<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flag Configurator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/monolith.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="canvas-container">
        <div id="loading-overlay" class="overlay is-visible" aria-live="polite">
            <div class="loading-card">
                <div class="spinner" aria-hidden="true"></div>
                <p id="loading-text">Loading 3D preview...</p>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div id="ui-header-wrapper">
            <h2>Flag Configurator</h2>
            <p class="panel-copy">Upload artwork, tune the preview, and export a clean client proof.</p>
        </div>

        <a href="Template.pdf" download="Template.pdf" class="guide-btn">
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Graphic Template
        </a>

        <div class="control-group">
            <div class="control-heading">
                <label for="front-upload">Front Artwork</label>
                <span class="control-hint">PNG or JPG</span>
            </div>

            <label id="front-dropzone" class="upload-card" for="front-upload" tabindex="0">
                <input type="file" id="front-upload" class="visually-hidden" accept="image/png, image/jpeg">
                <div class="upload-card-copy">
                    <span class="upload-title">Drop artwork here</span>
                    <span class="upload-subtitle">or click to browse your files</span>
                </div>
                <div id="front-thumb-frame" class="upload-thumb-frame" hidden>
                    <img id="front-thumb" class="upload-thumb" alt="Front artwork preview">
                </div>
            </label>

            <div id="front-actions" class="upload-actions" hidden>
                <button type="button" id="reset-front-tex" class="secondary-btn" title="Reset artwork transforms" disabled hidden>Reset</button>
                <button type="button" id="clear-front" class="danger-btn" title="Remove artwork" disabled hidden>Remove</button>
            </div>

            <div id="front-transforms" class="transform-controls" hidden>
                <label>Scale <input type="range" id="front-scale" min="0.1" max="3" step="0.01" value="1"></label>
                <label>Pan X <input type="range" id="front-x" min="-1" max="1" step="0.01" value="0"></label>
                <label>Pan Y <input type="range" id="front-y" min="-1" max="1" step="0.01" value="0"></label>
            </div>
        </div>

        <div class="control-group option-group">
            <label class="toggle-row">
                <input type="checkbox" id="double-sided" checked>
                Print Double-Sided
            </label>
        </div>

        <div id="back-artwork-group" class="control-group">
            <div class="control-heading">
                <label for="back-upload">Back Artwork</label>
                <span class="control-hint">PNG or JPG</span>
            </div>

            <label id="back-dropzone" class="upload-card" for="back-upload" tabindex="0">
                <input type="file" id="back-upload" class="visually-hidden" accept="image/png, image/jpeg">
                <div class="upload-card-copy">
                    <span class="upload-title">Drop artwork here</span>
                    <span class="upload-subtitle">or click to browse your files</span>
                </div>
                <div id="back-thumb-frame" class="upload-thumb-frame" hidden>
                    <img id="back-thumb" class="upload-thumb" alt="Back artwork preview">
                </div>
            </label>

            <div id="back-actions" class="upload-actions" hidden>
                <button type="button" id="reset-back-tex" class="secondary-btn" title="Reset artwork transforms" disabled hidden>Reset</button>
                <button type="button" id="clear-back" class="danger-btn" title="Remove artwork" disabled hidden>Remove</button>
            </div>

            <div id="back-transforms" class="transform-controls" hidden>
                <label>Scale <input type="range" id="back-scale" min="0.1" max="3" step="0.01" value="1"></label>
                <label>Pan X <input type="range" id="back-x" min="-1" max="1" step="0.01" value="0"></label>
                <label>Pan Y <input type="range" id="back-y" min="-1" max="1" step="0.01" value="0"></label>
            </div>
        </div>

        <div class="control-group">
            <div class="control-heading">
                <label for="pocket-color-trigger">Pocket Color</label>
            </div>
            <input type="hidden" id="pocket-color" value="#000000">
            <div class="color-picker-shell">
                <button type="button" id="pocket-color-trigger" class="color-picker-trigger" aria-expanded="false">
                    <span id="pocket-color-swatch" class="color-picker-swatch" aria-hidden="true"></span>
                    <span class="color-picker-text">
                        <span class="color-picker-title">Choose pocket color</span>
                        <span id="pocket-color-value" class="color-picker-value">#000000</span>
                    </span>
                </button>
            </div>
        </div>

        <div class="action-stack">
            <button type="button" id="generate-pdf" class="primary-btn">
                <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"></path>
                    <path d="M14 2v6h6"></path>
                    <path d="M8 13h8"></path>
                    <path d="M8 17h8"></path>
                </svg>
                Generate PDF Proof
            </button>
        </div>
    </div>

    <div id="camera-wrapper">
        <div id="camera-controls">
            <button type="button" id="cam-back" data-view="back" title="Back View">Back</button>
            <button type="button" id="cam-left" data-view="left" title="Left View">Left</button>
            <button type="button" id="cam-home" data-view="home" title="Home View">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button type="button" id="cam-right" data-view="right" title="Right View">Right</button>
            <button type="button" id="cam-front" data-view="front" title="Front View">Front</button>
        </div>

        <div id="camera-actions">
            <div id="ar-container" hidden></div>

            <button type="button" id="turntable-toggle" title="Toggle Turntable" aria-label="Toggle Turntable">
                <img class="control-icon" src="Icons/rotate.svg" alt="" aria-hidden="true">
            </button>

            <button type="button" id="play-pause" title="Shortcut: Press Spacebar" aria-label="Toggle Play Animation">
                <span class="camera-action-icon is-pause" aria-hidden="true">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
                        <rect x="6" y="5" width="4" height="14" rx="1.6" fill="currentColor"></rect>
                        <rect x="14" y="5" width="4" height="14" rx="1.6" fill="currentColor"></rect>
                    </svg>
                </span>
                <span class="camera-action-icon is-play" aria-hidden="true">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
                        <path d="M8 6v12l10-6z" fill="currentColor"></path>
                    </svg>
                </span>
            </button>

            <button type="button" id="env-toggle" title="Environment Settings" aria-label="Environment Settings">
                <img class="control-icon" src="Icons/env.svg" alt="" aria-hidden="true">
            </button>

            <div id="env-panel" hidden>
                <div class="env-header">
                    <span>Environment</span>
                    <button type="button" id="env-reset" title="Reset Environment">Reset</button>
                </div>
                <label>Exposure <input type="range" id="env-exposure" min="0.1" max="3" step="0.1" value="1"></label>
                <label>Rotate Light <input type="range" id="env-rotate" min="0" max="6.28" step="0.1" value="0"></label>
                <label class="env-checkbox">
                    Show Studio Bg <input type="checkbox" id="env-bg">
                </label>
            </div>
        </div>

    </div>

    <div id="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
